<!DOCTYPE html>
<html lang="en">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>(s)hoes</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0f14;
    color: #e8eaf0;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 24px;
  }

  .home {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 56px;
  }

  h1 {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: clamp(64px, 14vw, 116px);
    line-height: 1;
    letter-spacing: -0.02em;
    color: #ff5fa2;
  }

  .buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 18px;
  }

  .home-btn {
    display: inline-block;
    background: #ff5fa2;
    color: #0d0f14;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.02em;
    text-decoration: none;
    padding: 14px 44px;
    border-radius: 10px;
    transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .home-btn:hover {
    background: #ff77b3;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(255,95,162,0.28);
  }
  .home-btn:active { transform: translateY(0); }

  .home-btn.disabled {
    background: #161921;
    color: #6b7280;
    border: 1px solid rgba(255,255,255,0.12);
    cursor: not-allowed;
    pointer-events: none;
  }
  .home-btn.disabled .soon {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-left: 8px;
    opacity: 0.7;
  }
</style>
</head>
<body>
  <main class="home">
    <h1>(s)hoes</h1>
    <div class="buttons">
      <a class="home-btn" href="/charts">Charts</a>
      <!-- Arena not built yet — disabled until the app exists, then point href at /arena -->
      <span class="home-btn disabled" aria-disabled="true">Arena<span class="soon">soon</span></span>
    </div>
  </main>
</body>
</html>
