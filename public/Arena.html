<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>(s)hoes · Arena</title>
<link rel="stylesheet" href="/css/shared.css">
<link rel="stylesheet" href="/css/arena.css">
</head>
<body>

<header>
  <a class="site-title" href="/">(s)hoes<span> · Arena</span></a>
  <a class="back-link" href="/">← Home</a>
</header>

<main>
  <h2>Player Lookup</h2>

  <div class="search-bar">
    <div class="search-input-wrap">
      <input id="nick-input" type="text" placeholder="Player nick..." autocomplete="off"
             role="combobox" aria-expanded="false" aria-autocomplete="list" aria-controls="nick-suggest"
             oninput="onNickInput()" onkeydown="onNickKeydown(event)">
      <ul id="nick-suggest" class="suggest-list" role="listbox" hidden></ul>
    </div>
    <button id="search-btn" onclick="doSearch()">Look Up</button>
  </div>

  <div id="results"></div>
</main>

<script>
// ── Table loading (lazy, cached in-memory) ──────────────────────────────────
let _tables = null;

async function loadTables() {
  if (_tables) return _tables;
  const base = '/TextAsset/';
  const [gearOption, gearFactor, starForce, abilityOption, addAbilityOption, additionalAbilityOption, artifactTable] =
    await Promise.all([
      fetch(base + 'GearOptionTable.txt').then(r => r.json()),
      fetch(base + 'GearFactorTable.txt').then(r => r.json()),
      fetch(base + 'StarForceTable.txt').then(r => r.json()),
      fetch(base + 'GearAbilityOptionTable.txt').then(r => r.json()),
      fetch(base + 'GearAddAbilityOptionTable.txt').then(r => r.json()),
      fetch(base + 'GearAdditialAbilityOptionTable.txt').then(r => r.json()),
      fetch(base + 'ArtifactTable.txt').then(r => r.json()),
    ]);
  // Map every artifact equip-skill id → artifact identity. The Artifact buff lists these ids
  // under PassiveSkillLevels, so this resolves a player's worn artifacts (see extractArtifacts).
  const artifactBySkill = {};
  for (const e of artifactTable) {
    const info = { index: e.Index, code: e.ArtifactCode, grade: e.GradeType };
    for (const id of (e.EquipSkillIndices || [])) artifactBySkill[String(id)] = info;
  }
  _tables = {
    gearOption:              Object.fromEntries(gearOption.map(e => [e.OptionIndex, e.StatData])),
    gearFactor:              Object.fromEntries(gearFactor.map(e => [e.Level, e.Factor.map(Number)])),
    starForce:               Object.fromEntries(starForce.map(e => [e.StarForce, e])),
    abilityOption:           Object.fromEntries(abilityOption.map(e => [e.Index, e])),
    addAbilityOption:        Object.fromEntries(addAbilityOption.map(e => [e.Index, e])),
    additionalAbilityOption: Object.fromEntries(additionalAbilityOption.map(e => [e.Index, e])),
    artifactBySkill,
  };
  return _tables;
}

// ── Stat calculations — ported from calc_stats.py:78–130 ───────────────────

function calcCritResist(userInfo) {
  let total = 0;
  for (const hero of (userInfo.HeroInfos || [])) {
    for (const buff of (hero.BuffInput?.PartyHeroBuffInfoContainer?.BuffInfos || [])) {
      if (buff.BuffType === 'HeroPowerAbility')
        total += buff.StatContainer?._stats?.CriticalResist || 0;
    }
  }
  return total / 10;
}

function _gearOptionValue(optIdx, gl, sf, step, isMain, tables) {
  const sd = tables.gearOption[String(optIdx)];
  if (!sd) return [null, 0];
  const minV = +sd.MinValue, maxV = +sd.MaxValue, maxStep = +sd.OptionStep, factorCol = +sd.Factor;
  const factors = tables.gearFactor[String(gl)];
  const F = factors ? factors[factorCol] : 1000;
  const stepBonus = maxStep ? Math.floor((maxV - minV) * step / maxStep) : 0;
  const base = Math.floor(minV * F / 1000) + stepBonus;
  const sfEntry = tables.starForce[String(sf)];
  const sfBonus = sfEntry ? Math.floor(base * +sfEntry[isMain ? 'MainOptionMultiply' : 'SubOptionMultiply'] / 1000) : 0;
  return [sd.Type, base + sfBonus];
}

function _abilityStat(idx, statName, tables) {
  const s = String(idx);
  const add = tables.additionalAbilityOption[s];
  if (add?.StatType === statName) return +add.StatValue;
  for (const key of ['abilityOption', 'addAbilityOption']) {
    const e = tables[key][s];
    if (e?.StatData?.Type === statName) return +(e.StatData.Value || 0);
  }
  return 0;
}

function calcAvoidChance(userInfo, tables) {
  let total = 0;
  for (const hero of (userInfo.HeroInfos || [])) {
    const bi = hero.BuffInput || {};
    for (const buff of (bi.HeroBuffInfoContainer?.BuffInfos || []))
      if (['HeroPowerAbility', 'Artifact'].includes(buff.BuffType))
        total += buff.StatContainer?._stats?.AvoidChance || 0;
    for (const gear of (bi.GearInfos || [])) {
      const gl = +gear.GearLevel, sf = +gear.StarForce;
      for (const e of (gear.MainOptionList || [])) {
        const [t, v] = _gearOptionValue(e.OptionIndex, gl, sf, +e.OptionStep, true, tables);
        if (t === 'AvoidChance') total += v;
      }
      for (const e of (gear.SubOptionList || [])) {
        const [t, v] = _gearOptionValue(e.OptionIndex, gl, sf, +e.OptionStep, false, tables);
        if (t === 'AvoidChance') total += v;
      }
      for (const i of (gear.AbilityOptionIndices || [])) total += _abilityStat(i, 'AvoidChance', tables);
      for (const i of (gear.AdditionalAbilityOptionIndices || [])) total += _abilityStat(i, 'AvoidChance', tables);
    }
  }
  return Math.floor(total);
}

// HitChance ("Accuracy") is contributed by many buff types, so — unlike AvoidChance, which sums a
// curated subset — every buff in HeroBuffInfoContainer is summed. Ported from calc_stats.py calc_hit_chance.
function calcAccuracy(userInfo, tables) {
  let total = 0;
  for (const hero of (userInfo.HeroInfos || [])) {
    const bi = hero.BuffInput || {};
    for (const buff of (bi.HeroBuffInfoContainer?.BuffInfos || []))
      total += buff.StatContainer?._stats?.HitChance || 0;
    for (const gear of (bi.GearInfos || [])) {
      const gl = +gear.GearLevel, sf = +gear.StarForce;
      for (const e of (gear.MainOptionList || [])) {
        const [t, v] = _gearOptionValue(e.OptionIndex, gl, sf, +e.OptionStep, true, tables);
        if (t === 'HitChance') total += v;
      }
      for (const e of (gear.SubOptionList || [])) {
        const [t, v] = _gearOptionValue(e.OptionIndex, gl, sf, +e.OptionStep, false, tables);
        if (t === 'HitChance') total += v;
      }
      for (const i of (gear.AbilityOptionIndices || [])) total += _abilityStat(i, 'HitChance', tables);
      for (const i of (gear.AdditionalAbilityOptionIndices || [])) total += _abilityStat(i, 'HitChance', tables);
    }
  }
  return Math.floor(total);
}

// Friendly artifact display names keyed by ArtifactCode (ported from calc_stats.py — the in-game
// localized names are encrypted in the client, so these are supplied manually).
const ARTIFACT_NAMES = {
  'ARTIFACT_3_1':  'Charm of the Undead',
  'ARTIFACT_3_2':  "Pig's Ribbon",
  'ARTIFACT_3_3':  'Shamaness Marble',
  'ARTIFACT_3_4':  'The Contract of Darkness',
  'ARTIFACT_4_1':  'Rainbow-colored Snail Shell',
  'ARTIFACT_4_2':  'Hexagon Necklace',
  'ARTIFACT_4_3':  "Arwen's Glass Shoes",
  'ARTIFACT_4_4':  "Mushmom's Cap",
  'ARTIFACT_4_5':  'Clear Spring Water',
  'ARTIFACT_4_6':  "Athena Pierce's Old Gloves",
  'ARTIFACT_4_7':  "Zakum's Stone Piece",
  'ARTIFACT_4_8':  "Horntail's Scale",
  'ARTIFACT_5_1':  'Chalice',
  'ARTIFACT_5_2':  'Old Music Box',
  'ARTIFACT_5_3':  'Silver Pendant',
  'ARTIFACT_5_4':  'Star Rock',
  'ARTIFACT_5_5':  'The Book of Ancient',
  'ARTIFACT_5_6':  'Lunar Dew',
  'ARTIFACT_5_7':  'Fire Flower',
  'ARTIFACT_5_8':  'Soul Contract',
  'ARTIFACT_5_9':  'Lit Lamp',
  'ARTIFACT_5_10': 'Soul Pouch',
  'ARTIFACT_5_11': 'Ancient Text Piece',
  'ARTIFACT_5_12': 'Icy Soul Rock',
  'ARTIFACT_5_13': 'Flaming Lava',
  'ARTIFACT_5_14': "Sayram's Necklace",
  'ARTIFACT_5_15': 'Bottle of Emotion',
  'ARTIFACT_5_16': 'Peach Tree Herb Pouch',
  'ARTIFACT_5_17': 'Candle',
  'ARTIFACT_5_18': 'Alliance Badge',
  'ARTIFACT_5_19': 'Horn Flute',
  'ARTIFACT_5_20': 'Cursed Doll',
};

// The BuffType === "Artifact" buff lists each worn artifact's passive-skill ids under
// PassiveSkillLevels; each id maps to an artifact via artifactBySkill. Deduped by index in
// encounter order. Ported from calc_stats.py extract_artifacts.
function extractArtifacts(userInfo, tables) {
  const bySkill = tables.artifactBySkill || {};
  if (!Object.keys(bySkill).length) return [];
  const artifacts = [];
  const seen = new Set();
  for (const hero of (userInfo.HeroInfos || [])) {
    for (const buff of (hero.BuffInput?.HeroBuffInfoContainer?.BuffInfos || [])) {
      if (buff.BuffType !== 'Artifact') continue;
      for (const skillId of Object.keys(buff.PassiveSkillLevels || {})) {
        const info = bySkill[skillId];
        if (!info || seen.has(info.index)) continue;
        seen.add(info.index);
        artifacts.push({ code: info.code, grade: info.grade, name: ARTIFACT_NAMES[info.code] || info.code });
      }
    }
  }
  return artifacts;
}

// ── Autocomplete dropdown ────────────────────────────────────────────────────
let _suggestItems = [];      // current suggestions: [{ nick, short_battle_power }]
let _activeIndex = -1;       // highlighted row, -1 = none
let _suggestCtrl = null;     // AbortController for the in-flight suggest request

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function hideSuggest() {
  const box = document.getElementById('nick-suggest');
  box.hidden = true;
  box.innerHTML = '';
  _suggestItems = [];
  _activeIndex = -1;
  document.getElementById('nick-input').setAttribute('aria-expanded', 'false');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

const onNickInput = debounce(async () => {
  const q = document.getElementById('nick-input').value.trim();
  if (!q) { hideSuggest(); return; }
  if (_suggestCtrl) _suggestCtrl.abort();          // cancel any in-flight request
  _suggestCtrl = new AbortController();
  try {
    const res = await fetch('/userinfo/suggest?q=' + encodeURIComponent(q) + '&limit=8',
                            { signal: _suggestCtrl.signal });
    const { suggestions } = await res.json();
    renderSuggestions(suggestions || []);
  } catch (e) {
    if (e.name !== 'AbortError') hideSuggest();     // ignore superseded requests
  }
}, 150);

function renderSuggestions(list) {
  const box = document.getElementById('nick-suggest');
  _suggestItems = list;
  _activeIndex = -1;
  if (!list.length) { hideSuggest(); return; }
  box.innerHTML = list.map((it, i) =>
    `<li class="suggest-item" role="option" id="suggest-${i}" onmousedown="event.preventDefault()" onclick="selectSuggestion(${i})">` +
      `<span class="suggest-nick">${escapeHtml(it.nick)}</span>` +
      `<span class="suggest-bp">${escapeHtml(it.short_battle_power)}</span>` +
    `</li>`).join('');
  box.hidden = false;
  document.getElementById('nick-input').setAttribute('aria-expanded', 'true');
}

function highlight(idx) {
  const items = document.querySelectorAll('.suggest-item');
  items.forEach(el => el.classList.remove('active'));
  if (idx >= 0 && items[idx]) items[idx].classList.add('active');
  _activeIndex = idx;
}

function selectSuggestion(idx) {
  const it = _suggestItems[idx];
  if (!it) return;
  document.getElementById('nick-input').value = it.nick;
  hideSuggest();
  doSearch();
}

function onNickKeydown(e) {
  const open = !document.getElementById('nick-suggest').hidden;
  if (open && e.key === 'ArrowDown') {
    e.preventDefault();
    highlight((_activeIndex + 1) % _suggestItems.length);
  } else if (open && e.key === 'ArrowUp') {
    e.preventDefault();
    highlight((_activeIndex - 1 + _suggestItems.length) % _suggestItems.length);
  } else if (e.key === 'Enter') {
    if (open && _activeIndex >= 0) { e.preventDefault(); selectSuggestion(_activeIndex); }
    else { hideSuggest(); doSearch(); }
  } else if (e.key === 'Escape') {
    hideSuggest();
  }
}

// Close the dropdown when clicking anywhere outside the search input/list.
document.addEventListener('click', e => {
  if (!e.target.closest('.search-input-wrap')) hideSuggest();
});

// ── UI ─────────────────────────────────────────────────────────────────────

async function doSearch() {
  const nick = document.getElementById('nick-input').value.trim();
  if (!nick) return;
  const results = document.getElementById('results');
  results.innerHTML = '<p class="status">Searching…</p>';
  try {
    const res = await fetch('/userinfo?nick=' + encodeURIComponent(nick));
    const { rows, error } = await res.json();
    if (error) { results.innerHTML = `<p class="error">${error}</p>`; return; }
    if (!rows || rows.length === 0) { results.innerHTML = '<p class="status">No data found for that nick.</p>'; return; }
    renderSnapshots(rows);
  } catch (e) {
    results.innerHTML = `<p class="error">Request failed: ${e.message}</p>`;
  }
}

function renderSnapshots(rows) {
  const results = document.getElementById('results');
  const list = rows.map(row => {
    const date = new Date(row.captured_at * 1000).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
    return `<button class="snapshot-btn" onclick="selectSnapshot(${JSON.stringify(row).replace(/"/g, '&quot;')}, event)">${row.short_battle_power} <span class="snap-date">${date}</span></button>`;
  }).join('');
  results.innerHTML = `<p class="snapshots-label">Select a snapshot</p><div class="snapshot-list">${list}</div><div id="stat-panel"></div>`;
}

async function selectSnapshot(row, evt) {
  const panel = document.getElementById('stat-panel');
  panel.innerHTML = '<p class="status">Loading tables…</p>';
  document.querySelectorAll('.snapshot-btn').forEach(b => b.classList.remove('active'));
  (evt ? evt.currentTarget : event.currentTarget).classList.add('active');
  try {
    const tables = await loadTables();
    const userInfo = JSON.parse(row.raw_json);
    const avoid = calcAvoidChance(userInfo, tables);
    const accuracy = calcAccuracy(userInfo, tables);
    const crit = calcCritResist(userInfo);
    const artifacts = extractArtifacts(userInfo, tables);
    panel.innerHTML = `
      <div class="stat-cards">
        <div class="stat-card"><span class="stat-label">Evasion</span><span class="stat-value">${avoid.toLocaleString()}</span></div>
        <div class="stat-card"><span class="stat-label">Accuracy</span><span class="stat-value">${accuracy.toLocaleString()}</span></div>
        <div class="stat-card"><span class="stat-label">Critical Resistance</span><span class="stat-value">${crit.toFixed(1)}%</span></div>
      </div>
      ${renderArtifacts(artifacts)}`;
  } catch (e) {
    panel.innerHTML = `<p class="error">Calc failed: ${e.message}</p>`;
  }
}

function renderArtifacts(artifacts) {
  if (!artifacts.length) return '';
  const chips = artifacts.map(a =>
    `<span class="artifact-chip ${(a.grade || '').toLowerCase()}">${escapeHtml(a.name)}</span>`
  ).join('');
  return `<div class="artifacts-section"><p class="artifacts-label">Artifacts</p><div class="artifact-list">${chips}</div></div>`;
}
</script>
</body>
</html>
